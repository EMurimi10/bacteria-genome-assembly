# ── Samples ──────────────────────────────
samples:
  - sample1
  - sample2
  - sample3

# ── Directories ──────────────────────────
reads_dir: "reads"

# ── Trimmomatic ───────────────────────────
trimmomatic:
  sliding_window: "4:20"
  min_len: 50
  leading: 3
  trailing: 3

# ── SPAdes ────────────────────────────────
spades:
  threads: 4
  memory: 8

# ── QUAST ─────────────────────────────────
quast:
  threads: 4
  min_contig: 500

# ── BUSCO ─────────────────────────────────
busco:
  lineage: "bacteria_odb10"
  threads: 4

# ── ABRicate AMR ──────────────────────────
abricate:
  databases:
    - ncbi
    - card
    - resfinder
  min_coverage: 80
  min_identity: 90

